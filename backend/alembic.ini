# Alembic configuration for ASHA-AI backend
# Tier 6.6 Phase D · replaces raw SQL migrations in db/migrations/ with
# managed Alembic versions in alembic/versions/.
#
# Usage (from D:\hack\backend with the venv active):
#   alembic upgrade head          # apply all pending migrations
#   alembic revision --autogenerate -m "describe change"  # author a new migration
#   alembic history               # show history
#   alembic downgrade -1          # roll back the most recent migration (with care!)

[alembic]
script_location = alembic
prepend_sys_path = .
# DATABASE_URL is read from env (see alembic/env.py); no inline credentials.
sqlalchemy.url =

# Naming convention — keeps autogenerated indexes/FKs deterministic so future
# migrations can detect them correctly.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Use timezone-aware timestamps in filenames.
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
