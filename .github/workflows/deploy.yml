# ASHA-AI · CD (continuous deployment)
# Runs on push to main after CI is green.
# Gates:
#   1. CI must be green (workflow_run trigger waits for CI completion).
#   2. Backend Docker image is built + pushed to registry.
#   3. Staging deploy via SSH (smoke test included).
#   4. Manual approval before production.
#   5. Production deploy via SSH + Sentry release notification.

name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # Never cancel a deploy mid-flight.

jobs:
  build:
    name: Build + push backend image
    # Only run if the upstream CI run succeeded.
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          tag="${{ github.sha }}"
          echo "image_tag=$tag" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/asha-ai-backend:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ github.repository_owner }}/asha-ai-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy → staging
    needs: build
    if: github.event.inputs.target != 'production'
    runs-on: ubuntu-22.04
    environment:
      name: staging
      url: https://staging.asha-ai.in
    steps:
      - uses: actions/checkout@v4

      - name: SSH deploy to staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/asha-ai
            export ASHA_IMAGE_TAG=${{ needs.build.outputs.image_tag }}
            docker compose -f infra/docker-compose.prod.yml pull backend worker
            docker compose -f infra/docker-compose.prod.yml run --rm backend alembic upgrade head
            docker compose -f infra/docker-compose.prod.yml up -d backend worker flower
            sleep 8
            curl -fsS https://staging.asha-ai.in/api/v1/health || exit 1

      - name: Smoke test against staging
        run: |
          set -e
          curl -fsS https://staging.asha-ai.in/api/v1/health
          # /triage with a known non-PHI synthetic payload — confirm Plan 4.0 path works end-to-end.
          curl -fsS -X POST https://staging.asha-ai.in/api/triage \
            -H "Content-Type: application/json" \
            -d '{"structured_symptoms":[{"body_region":"chest_left_anterior","body_view":"front","x":0.5,"y":0.5,"intensity":7,"quality":["pressure"],"duration_band":"few_hours","aggravators":["nothing"]}],"input_mode":"body_map","session_id":"ci-smoke"}'

  deploy-production:
    name: Deploy → production (manual approval)
    needs: build
    if: github.event.inputs.target == 'production'
    runs-on: ubuntu-22.04
    environment:
      # Configure required reviewers + protection rules on this environment in
      # Settings → Environments → production. Manual approval is mandatory.
      name: production
      url: https://api.asha-ai.in
    steps:
      - uses: actions/checkout@v4

      - name: SSH deploy to production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/asha-ai
            export ASHA_IMAGE_TAG=${{ needs.build.outputs.image_tag }}
            # Capture pre-deploy version for rollback reference.
            docker compose -f infra/docker-compose.prod.yml ps backend > /tmp/asha-pre-deploy.log
            docker compose -f infra/docker-compose.prod.yml pull backend worker
            docker compose -f infra/docker-compose.prod.yml run --rm backend alembic upgrade head
            docker compose -f infra/docker-compose.prod.yml up -d backend worker flower
            sleep 10
            curl -fsS https://api.asha-ai.in/api/v1/health || exit 1

      - name: Notify Sentry of release
        if: success()
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: asha-ai-backend
        with:
          environment: production
          version: ${{ needs.build.outputs.image_tag }}

      - name: Post-deploy monitoring window
        run: |
          echo "::notice::Deploy complete. Post-deploy observation window open."
          echo "::notice::Watch: Sentry P0/P1 · Prometheus p95 latency · model drift · LLM cost."
