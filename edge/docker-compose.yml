# ASHA-AI — Edge stack (Plan 3.0)
# ================================
# One-command local edge stack: Ollama daemon + ASHA-AI backend in offline mode.
# Run from D:\hack\edge:
#
#   docker compose up -d
#   docker compose exec ollama ollama pull gemma2:9b
#   curl http://localhost:8000/api/v1/health   # provider should be ollama
#
# Stop:
#   docker compose down

version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ashaai-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 6

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: ashaai-backend-edge
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      LLM_PROVIDER: ollama
      OLLAMA_BASE: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma2:9b}
      OLLAMA_TIMEOUT_S: "30"
      # Bhashini is cloud-only — disabled in edge mode by leaving the key unset.
      BHASHINI_API_KEY: ""
      # Supabase Storage is cloud-only — RAG retriever falls back to local
      # embeddings.jsonl when SUPABASE_URL is unset.
      RAG_CORPUS_PATH: /app/ml/rag/corpus.jsonl
      RAG_EMBEDDINGS_PATH: /app/ml/rag/embeddings.jsonl
    volumes:
      - ../ml/rag:/app/ml/rag:ro
    ports:
      - "8000:8000"

volumes:
  ollama_models:
